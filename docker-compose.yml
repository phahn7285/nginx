services:
  nginx:
    image: nginx:1.27-alpine
    init: true
    restart: unless-stopped
    container_name: nginx
    # Parent .env (e.g. /home/paul/.env): HOST_LAN_IP must reach the container without compose-time
    # ${HOST_LAN_IP} interpolation (that uses the compose project dir only and was injecting empty).
    env_file:
      - ../.env
    environment:
      DNS_DOMAIN_NAME: ${DNS_DOMAIN_NAME:-localhost}
    volumes:
      - ./nginx.conf:/etc/nginx/templates/nginx.conf.template:ro
      - ../react/static/css:/var/www/css:ro
      - ./static/html:/var/www/html:ro
      - ./static/icons:/var/www/icons:ro
    command: >
      /bin/sh -c
      "envsubst '$$DNS_DOMAIN_NAME $$HOST_LAN_IP' < /etc/nginx/templates/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    networks:
      - penny-net
    ports:
      - "5001:80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O- http://127.0.0.1/health >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  penny-net:
    external: true

